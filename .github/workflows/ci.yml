name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Unit Tests ─────────────────────────────────────────────
  unit-test:
    name: Unit Tests (JDK ${{ matrix.java }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        java: [ 11 ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin
          cache: maven

      - name: Run unit tests
        run: >
          mvn -B test
          -Dtest='!*IntegrationTest,!*RealMessageTest'

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports-jdk${{ matrix.java }}
          path: '**/target/surefire-reports/'
          retention-days: 7

  # ── Build Verification ─────────────────────────────────────
  build:
    name: Build Shaded JARs
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: unit-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: 11
          distribution: temurin
          cache: maven

      - name: Build
        run: mvn -B clean package -DskipTests

      - name: Verify shaded JARs exist
        run: |
          ls -lh dingtalk-flink-connector-1.20/target/dingtalk-flink-connector-1.20-*.jar
          ls -lh dingtalk-flink-connector-2.2/target/dingtalk-flink-connector-2.2-*.jar
