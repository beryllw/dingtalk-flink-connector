name: Release

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.0.0)'
        required: true

permissions:
  contents: write

jobs:
  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Determine version
        id: version
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TAG="$INPUT_TAG"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG"         >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: 11
          distribution: temurin
          cache: maven

      - name: Set Maven project version
        env:
          PROJECT_VERSION: ${{ steps.version.outputs.version }}
        run: >
          mvn -B versions:set -DnewVersion="$PROJECT_VERSION"
          -DgenerateBackupPoms=false

      - name: Run tests & build shaded JARs
        run: >
          mvn -B verify
          -Dtest='!*IntegrationTest,!*RealMessageTest'

      - name: List artifacts
        id: artifacts
        run: |
          JAR_120=$(ls dingtalk-flink-connector-1.20/target/dingtalk-flink-connector-1.20-*.jar | grep -v original | head -1)
          JAR_22=$(ls dingtalk-flink-connector-2.2/target/dingtalk-flink-connector-2.2-*.jar | grep -v original | head -1)
          echo "jar_120=$JAR_120" >> "$GITHUB_OUTPUT"
          echo "jar_22=$JAR_22"   >> "$GITHUB_OUTPUT"
          echo "Found artifacts:"
          ls -lh "$JAR_120" "$JAR_22"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            ${{ steps.artifacts.outputs.jar_120 }}
            ${{ steps.artifacts.outputs.jar_22 }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
